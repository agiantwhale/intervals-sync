name: Strava webhook → process event

on:
  repository_dispatch:
    types:
      - strava-activity-create
      - strava-activity-update
      - strava-activity-delete
      - strava-athlete-deauthorize

jobs:
  process:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Show event metadata
        run: |
          echo "event_type:    ${{ github.event.action }}"
          echo "object_type:   ${{ github.event.client_payload.object_type }}"
          echo "object_id:     ${{ github.event.client_payload.object_id }}"
          echo "aspect_type:   ${{ github.event.client_payload.aspect_type }}"
          echo "owner_id:      ${{ github.event.client_payload.owner_id }}"
          echo "event_time:    ${{ github.event.client_payload.event_time }}"
          echo "subscription:  ${{ github.event.client_payload.subscription_id }}"
          echo "updates:       ${{ toJSON(github.event.client_payload.updates) }}"

      # Sync only runs on create/update — delete has no activity to sync, and
      # deauthorize fires once when the athlete revokes the app.
      - uses: actions/checkout@v6
        if: |
          github.event.action == 'strava-activity-create' ||
          github.event.action == 'strava-activity-update'

      - name: Set up Python
        if: |
          github.event.action == 'strava-activity-create' ||
          github.event.action == 'strava-activity-update'
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install Dependencies
        if: |
          github.event.action == 'strava-activity-create' ||
          github.event.action == 'strava-activity-update'
        run: pip install requests

      - name: Sync planned-workout description into Strava
        if: |
          github.event.action == 'strava-activity-create' ||
          github.event.action == 'strava-activity-update'
        env:
          FITNESS_MCP_URL: ${{ secrets.FITNESS_MCP_URL }}
          FITNESS_MCP_TOKEN: ${{ secrets.FITNESS_MCP_TOKEN }}
        run: python sync_strava.py --activity-id ${{ github.event.client_payload.object_id }}
