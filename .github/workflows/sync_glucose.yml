name: Nightscout to Intervals Sync
on:
  # Scheduled run disabled; trigger manually via workflow_dispatch if needed.
  # schedule:
  #   - cron: '*/5 * * * *'  # Runs every 5 minutes
  workflow_dispatch:        # Allows you to run it manually

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install Dependencies
        run: pip install requests
      - name: Run Sync
        env:
          FITNESS_MCP_URL: ${{ secrets.FITNESS_MCP_URL }}
          FITNESS_MCP_TOKEN: ${{ secrets.FITNESS_MCP_TOKEN }}
        run: python sync_glucose.py
