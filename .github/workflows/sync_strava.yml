name: Strava description backfill

on:
  # Scheduled run disabled; trigger manually via workflow_dispatch if needed.
  # schedule:
  #   - cron: '*/15 * * * *'  # Every 15 minutes
  workflow_dispatch:
    inputs:
      count:
        description: "How many recent Strava activities to scan"
        required: false
        default: "20"

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install Dependencies
        run: pip install requests
      - name: Run Sync
        env:
          FITNESS_MCP_URL: ${{ secrets.FITNESS_MCP_URL }}
          FITNESS_MCP_TOKEN: ${{ secrets.FITNESS_MCP_TOKEN }}
          STRAVA_SYNC_COUNT: ${{ inputs.count || '20' }}
        run: python sync_strava.py
